name: Eidetic Research Missing Twin
description: "Find omitted companion changes from repository history."
author: Eidetic Research
branding:
  icon: shield
  color: blue
inputs:
  base:
    description: "Base git ref. Defaults to the pull request base SHA/ref."
    required: false
  head:
    description: "Head git ref. Defaults to the pull request head SHA/ref."
    required: false
  config:
    description: "Config file path. Defaults to .github/missing-twin.yml."
    required: false
  mode:
    description: "warn or fail. Defaults to warn."
    required: false
    default: warn
  format:
    description: "json or markdown. Defaults to markdown."
    required: false
    default: markdown
  comment:
    description: "When true, create or update one pull request comment. Defaults to false."
    required: false
    default: "false"
  github-token:
    description: "Token used only when comment is true. Defaults to github.token."
    required: false
    default: ${{ github.token }}
  model:
    description: "Optional path to a precomputed missing-twin model JSON."
    required: false
  since:
    description: "Git history window used when learning on the fly."
    required: false
outputs:
  json:
    description: JSON scan result.
  markdown:
    description: Markdown scan report.
  findings:
    description: Number of findings.
runs:
  using: node20
  main: dist/index.js
